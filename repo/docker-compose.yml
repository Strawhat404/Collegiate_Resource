services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crhgc-app
    restart: unless-stopped
    volumes:
      - crhgc-data:/root/.local/share/CRHGC
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_QPA_PLATFORM=xcb
    network_mode: host

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crhgc-test
    command: ["bash", "/app/run_tests.sh"]
    environment:
      - DISPLAY=:99
      - QT_QPA_PLATFORM=offscreen
    profiles:
      - test

volumes:
  crhgc-data:
