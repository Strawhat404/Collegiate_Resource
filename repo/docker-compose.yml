services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crhgc-app
    restart: unless-stopped
    volumes:
      - crhgc-data:/root/.local/share/CRHGC
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_QPA_PLATFORM=xcb
    network_mode: host

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crhgc-test
    command: >
      bash -c "
        rm -f /tmp/.X99-lock &&
        Xvfb :99 -screen 0 1280x720x24 -nolisten tcp &
        sleep 1 &&
        export DISPLAY=:99 &&
        export QT_QPA_PLATFORM=offscreen &&
        cd /app &&
        PASS=0; FAIL=0;
        echo '==========================================';
        echo '  CRHGC Test Suite  (container runtime)';
        echo '==========================================';
        echo '';
        echo '=== Headless Verification (verify.py) ===';
        if python3 /app/verify.py; then PASS=$((PASS+1)); echo 'PASS: verify.py'; else FAIL=$((FAIL+1)); echo 'FAIL: verify.py'; fi;
        echo '';
        echo '=== Unit / API / E2E Tests (pytest) ===';
        if python3 -m pytest /app -q --tb=short; then PASS=$((PASS+1)); echo 'PASS: pytest'; else FAIL=$((FAIL+1)); echo 'FAIL: pytest'; fi;
        echo '';
        echo '==========================================';
        echo '  Test Summary';
        echo '==========================================';
        echo \"Suites passed: $PASS\";
        echo \"Suites failed: $FAIL\";
        echo '==========================================';
        if [ $FAIL -gt 0 ]; then echo 'RESULT: SOME TESTS FAILED'; exit 1; else echo 'RESULT: ALL TESTS PASSED'; exit 0; fi
      "
    environment:
      - DISPLAY=:99
      - QT_QPA_PLATFORM=offscreen
    profiles:
      - test

volumes:
  crhgc-data:
